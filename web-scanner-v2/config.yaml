# Ultimate Web Security Scanner v2.0 Configuration

engines:
  golang:
    enabled: true
    max_goroutines: 1000
    timeout: 30s
    modules:
      - portscan
      - subdomain
      - websocket
      - http2
      - race
  
  rust:
    enabled: true
    fuzzer_threads: 100
    payload_mutations: 10000
    timeout: 120s
    modules:
      - fuzzer
      - payload
      - crypto
      - bruteforce
  
  ruby:
    enabled: false  # Requires Metasploit Framework
    msf_path: /opt/metasploit-framework
    modules:
      - exploit_scanner
      - shell_generator
      - post_exploitation
  
  python:
    enabled: true
    default_engine: true
    modules:
      - xxe
      - jwt
      - ssti
      - cors
      - graphql
      - nosql

performance:
  mode: hybrid  # python, golang, rust, ruby, hybrid
  max_threads: 100
  rate_limit: 1000  # requests per second
  timeout: 30  # seconds
  retry_attempts: 3

scanning:
  # Port scanning
  port_scan:
    enabled: true
    engine: golang  # golang is 10x faster
    ports: common  # common, top1000, all
    timeout: 1s
  
  # Subdomain enumeration
  subdomain:
    enabled: true
    engine: golang
    wordlist: common  # common, extended, custom
    dns_servers:
      - 8.8.8.8
      - 1.1.1.1
  
  # Fuzzing
  fuzzing:
    enabled: true
    engine: rust  # rust is fastest for fuzzing
    mutations: 10000
    max_requests: 5000
  
  # Exploitation
  exploitation:
    enabled: false
    engine: ruby
    auto_exploit: false
    verify_exploits: true

output:
  format: json  # json, html, xml, csv
  verbose: true
  save_payloads: true
  screenshot: false

security:
  verify_ssl: false
  follow_redirects: true
  max_redirects: 5
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  
stealth:
  enabled: false
  random_user_agent: false
  delay_between_requests: 0  # milliseconds
  proxy: null  # http://proxy:port
